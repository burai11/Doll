<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>studio_蕨</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- キャラクター表示エリア -->
  <main id="stage">
    <canvas id="character-canvas"></canvas>

    <header id="app-header">
      <h1 id="app-title">studio_<span>蕨</span></h1>
      <button id="btn-studio" class="icon-btn" type="button" aria-label="Studio Modeを開く">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
    </header>

    <!-- Studio Mode 操作（Studio Mode中のみ表示） -->
    <div id="studio-controls" hidden>
      <button id="btn-studio-exit" class="studio-btn" type="button">もどる</button>
      <button id="btn-save" class="studio-btn primary" type="button">PNG保存</button>
    </div>
  </main>

  <!-- 着せ替えUI -->
  <section id="wardrobe" aria-label="着せ替え">
    <nav id="category-tabs" aria-label="カテゴリ"></nav>
    <div id="item-list" role="listbox" aria-label="衣装一覧"></div>
  </section>

  <div id="loading">読み込み中…</div>

  <script src="js/dataLoader.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/wardrobe.js"></script>
  <script src="js/studio.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
