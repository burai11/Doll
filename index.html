<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>studio_warabi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="stage">
    <canvas id="character-canvas"></canvas>
    <header id="app-header">
      <h1 id="app-title">studio_<span>warabi</span></h1>
      <div class="header-actions">
        <label class="character-select-label" for="character-select">Character</label>
        <select id="character-select" aria-label="Character"></select>
        <button id="btn-studio" class="icon-btn" type="button" aria-label="Open studio mode">Camera</button>
      </div>
    </header>
    <div id="studio-controls" hidden>
      <button id="btn-studio-exit" class="studio-btn" type="button">Back</button>
      <button id="btn-save" class="studio-btn primary" type="button">Save PNG</button>
    </div>
  </main>
  <section id="wardrobe" aria-label="Wardrobe">
    <nav id="category-tabs" aria-label="Categories"></nav>
    <div id="item-list" role="listbox" aria-label="Items"></div>
  </section>
  <div id="loading">Loading...</div>
  <script src="js/dataLoader.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/wardrobe.js"></script>
  <script src="js/studio.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
